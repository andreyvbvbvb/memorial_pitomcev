name: k6 Production Load Test

on:
  workflow_dispatch:
    inputs:
      vus:
        description: Virtual users
        required: true
        default: "500"
      duration:
        description: Test duration
        required: true
        default: "45s"
      p95_ms:
        description: P95 threshold in milliseconds
        required: true
        default: "5000"

permissions:
  contents: read

concurrency:
  group: k6-production-load-test
  cancel-in-progress: false

jobs:
  public-load-test:
    name: Public traffic
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install k6
        uses: grafana/setup-k6-action@v1

      - name: Run production test
        uses: grafana/run-k6-action@v1
        env:
          API_BASE_URL: https://xn--80aeb9a9a9d.com/api
          WEB_BASE_URL: https://xn--80aeb9a9a9d.com
          VUS: ${{ inputs.vus }}
          DURATION: ${{ inputs.duration }}
          P95_MS: ${{ inputs.p95_ms }}
        with:
          path: load-tests/k6/public-browse.js
          flags: --summary-export=k6-summary.json
          disable-analytics: true

      - name: Save k6 summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: k6-summary-${{ github.run_number }}
          path: k6-summary.json
          if-no-files-found: ignore
          retention-days: 14
