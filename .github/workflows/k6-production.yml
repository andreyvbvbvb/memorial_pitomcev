name: k6 Production Load Test

on:
  workflow_dispatch:
    inputs:
      suite:
        description: Test suite
        required: true
        type: choice
        default: mixed
        options:
          - mixed
          - split
          - assets
      vus:
        description: Virtual users
        required: true
        default: "500"
      duration:
        description: Hold duration at target VUs
        required: true
        default: "45s"
      ramp_up:
        description: Ramp-up duration
        required: true
        default: "30s"
      ramp_down:
        description: Ramp-down duration
        required: true
        default: "15s"
      p95_ms:
        description: P95 threshold in milliseconds
        required: true
        default: "5000"

permissions:
  contents: read

concurrency:
  group: k6-production-load-test
  cancel-in-progress: false

jobs:
  public-load-test:
    name: Public traffic
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install k6
        uses: grafana/setup-k6-action@v1

      - name: Run mixed production test
        id: mixed
        if: inputs.suite == 'mixed'
        continue-on-error: true
        uses: grafana/run-k6-action@v1
        env:
          API_BASE_URL: https://xn--80aeb9a9a9d.com/api
          WEB_BASE_URL: https://xn--80aeb9a9a9d.com
          VUS: ${{ inputs.vus }}
          DURATION: ${{ inputs.duration }}
          RAMP_UP: ${{ inputs.ramp_up }}
          RAMP_DOWN: ${{ inputs.ramp_down }}
          P95_MS: ${{ inputs.p95_ms }}
        with:
          path: load-tests/k6/public-browse.js
          flags: --summary-export=k6-summary-mixed.json
          disable-analytics: true

      - name: Run API-only production test
        id: api
        if: inputs.suite == 'split'
        continue-on-error: true
        uses: grafana/run-k6-action@v1
        env:
          API_BASE_URL: https://xn--80aeb9a9a9d.com/api
          WEB_BASE_URL: https://xn--80aeb9a9a9d.com
          VUS: ${{ inputs.vus }}
          DURATION: ${{ inputs.duration }}
          RAMP_UP: ${{ inputs.ramp_up }}
          RAMP_DOWN: ${{ inputs.ramp_down }}
          P95_MS: ${{ inputs.p95_ms }}
        with:
          path: load-tests/k6/api-only.js
          flags: --summary-export=k6-summary-api.json
          disable-analytics: true

      - name: Run web-only production test
        id: web
        if: inputs.suite == 'split'
        continue-on-error: true
        uses: grafana/run-k6-action@v1
        env:
          API_BASE_URL: https://xn--80aeb9a9a9d.com/api
          WEB_BASE_URL: https://xn--80aeb9a9a9d.com
          VUS: ${{ inputs.vus }}
          DURATION: ${{ inputs.duration }}
          RAMP_UP: ${{ inputs.ramp_up }}
          RAMP_DOWN: ${{ inputs.ramp_down }}
          P95_MS: ${{ inputs.p95_ms }}
        with:
          path: load-tests/k6/web-only.js
          flags: --summary-export=k6-summary-web.json
          disable-analytics: true

      - name: Run editor asset production test
        id: assets
        if: inputs.suite == 'assets'
        continue-on-error: true
        uses: grafana/run-k6-action@v1
        env:
          WEB_BASE_URL: https://xn--80aeb9a9a9d.com
          VUS: ${{ inputs.vus }}
          MODEL_P95_MS: "30000"
          IMAGE_P95_MS: "15000"
          ASSET_BATCH_SIZE: "2"
        with:
          path: load-tests/k6/editor-assets.js
          flags: --summary-export=k6-summary-assets.json
          disable-analytics: true

      - name: Save k6 summaries
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: k6-summary-${{ github.run_number }}
          path: k6-summary-*.json
          if-no-files-found: ignore
          retention-days: 14

      - name: Evaluate thresholds
        if: always()
        env:
          MIXED_OUTCOME: ${{ steps.mixed.outcome }}
          API_OUTCOME: ${{ steps.api.outcome }}
          WEB_OUTCOME: ${{ steps.web.outcome }}
          ASSETS_OUTCOME: ${{ steps.assets.outcome }}
        run: |
          if [[ "$MIXED_OUTCOME" == "failure" || "$API_OUTCOME" == "failure" || "$WEB_OUTCOME" == "failure" || "$ASSETS_OUTCOME" == "failure" ]]; then
            echo "One or more k6 suites exceeded their thresholds."
            exit 1
          fi
