services:
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-/api}
        NEXT_PUBLIC_GOOGLE_MAPS_API_KEY: ${NEXT_PUBLIC_GOOGLE_MAPS_API_KEY}
        NEXT_PUBLIC_HERO_VIDEO_URL: ${NEXT_PUBLIC_HERO_VIDEO_URL}
    environment:
      - PORT=3002
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-/api}
      - NEXT_PUBLIC_HERO_VIDEO_URL=${NEXT_PUBLIC_HERO_VIDEO_URL}
      - INTERNAL_API_URL=${INTERNAL_API_URL:-http://api:3001}
    ports:
      - "3002:3002"
    depends_on:
      - api

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      - PORT=3001
      - DATABASE_URL=${DATABASE_URL}
      - PG_POOL_MAX=${PG_POOL_MAX:-20}
      - PG_POOL_CONNECTION_TIMEOUT_MS=${PG_POOL_CONNECTION_TIMEOUT_MS:-5000}
      - PG_POOL_IDLE_TIMEOUT_MS=${PG_POOL_IDLE_TIMEOUT_MS:-30000}
      - GITHUB_WORKFLOW_TOKEN=${GITHUB_WORKFLOW_TOKEN:-}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRES=${JWT_EXPIRES}
      - FRONTEND_URL=${FRONTEND_URL:-https://xn--80aeb9a9a9d.com}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      - SMTP_FROM=${SMTP_FROM}
      - SMTP_SECURE=${SMTP_SECURE}
      - CLOUDPAYMENTS_PUBLIC_ID=${CLOUDPAYMENTS_PUBLIC_ID}
      - CLOUDPAYMENTS_API_SECRET=${CLOUDPAYMENTS_API_SECRET}
      - S3_ENDPOINT=${S3_ENDPOINT}
      - S3_REGION=${S3_REGION}
      - S3_BUCKET=${S3_BUCKET}
      - S3_ACCESS_KEY_ID=${S3_ACCESS_KEY_ID}
      - S3_SECRET_ACCESS_KEY=${S3_SECRET_ACCESS_KEY}
      - S3_PUBLIC_BASE_URL=${S3_PUBLIC_BASE_URL}
    ports:
      - "3001:3001"
    command: sh -c "node /app/apps/api/node_modules/prisma/build/index.js generate && node -e \"const fs=require('fs');const path=require('path');const clientDir=path.dirname(require.resolve('@prisma/client'));const source=path.join(clientDir,'..','..','.prisma');const target=path.join(clientDir,'.prisma');fs.rmSync(target,{recursive:true,force:true});fs.cpSync(source,target,{recursive:true});\" && node /app/apps/api/node_modules/prisma/build/index.js migrate deploy && node dist/main.js"
